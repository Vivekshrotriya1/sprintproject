name: Deploy Python FastAPI app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"
  AZURE_WEBAPP_NAME: "sprintproject"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Fetch Git LFS files
        shell: bash
        run: |
          git lfs pull
          model_size="$(wc -c < models/walmart_pipeline_model.pkl)"
          echo "Repository model size: ${model_size} bytes"
          if head -c 20 models/walmart_pipeline_model.pkl | grep -q "version https"; then
            echo "Model file is still a Git LFS pointer. Check Git LFS upload for models/walmart_pipeline_model.pkl."
            exit 1
          fi
          if [ "$model_size" -lt 100000 ]; then
            echo "Model file is too small to be the trained pickle."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create lightweight Azure package
        shell: bash
        run: |
          mkdir -p deploy-package
          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".env" \
            --exclude "venv" \
            --exclude "antenv" \
            --exclude ".python_packages" \
            --exclude "github_packages" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude "logs" \
            --exclude "api/logs" \
            --exclude "tests" \
            --exclude "dashboard" \
            --exclude "exports" \
            --exclude "deployment" \
            --exclude "data/raw" \
            --exclude "agents/documents" \
            --exclude "agents/vector_store" \
            --exclude "agents/test_blob.py" \
            --exclude "agents/rag_setup.py" \
            --exclude "agents/blob_storage.py" \
            --exclude "agents/inventory_agent.py" \
            --exclude "agents/main.py" \
            --exclude "agents/policy_agent.py" \
            --exclude "agents/retail_strategy_agent.py" \
            --exclude "agents/tools.py" \
            --exclude "agents/rag_data/faiss_index.bin" \
            --exclude "agents/rag_data/show_faiss_vectors.py" \
            --exclude "blobstorage/run_blob.py" \
            --exclude "*.pyc" \
            ./ deploy-package/

          cp requirements-azure.txt deploy-package/requirements.txt
          package_model_size="$(wc -c < deploy-package/models/walmart_pipeline_model.pkl)"
          echo "Packaged model size: ${package_model_size} bytes"
          if [ "$package_model_size" -lt 100000 ]; then
            echo "Packaged model is too small to be the trained pickle."
            exit 1
          fi

      - name: Install dependencies into deployment package
        shell: bash
        working-directory: deploy-package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt --target="github_packages/lib/site-packages" --upgrade
          find github_packages -type d -name "__pycache__" -prune -exec rm -rf {} +
          find github_packages -type f -name "*.pyc" -delete

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: deploy-package
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
