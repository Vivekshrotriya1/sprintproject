name: Deploy Python FastAPI app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"
  AZURE_WEBAPP_NAME: "YOUR_AZURE_WEBAPP_NAME"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create Linux-safe requirements
        shell: bash
        run: |
          mkdir -p deploy-package
          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".env" \
            --exclude "venv" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude "logs" \
            --exclude "api/logs" \
            --exclude "*.pyc" \
            ./ deploy-package/

          {
            echo "--extra-index-url https://download.pytorch.org/whl/cpu"
            grep -v -E "^(pywin32==|torch==|torchaudio==|torchvision==)" requirements.txt
            echo "torch==2.2.2+cpu"
            echo "torchaudio==2.2.2+cpu"
            echo "torchvision==0.17.2+cpu"
          } > deploy-package/requirements.txt

      - name: Install dependencies for validation
        shell: bash
        working-directory: deploy-package
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: deploy-package

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
